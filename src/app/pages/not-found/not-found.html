<div class="bg"></div>
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">
  <div class="card">

    <div class="logo">
      <div class="logo-ico">
        <img *ngIf="logoUrl; else defaultIcon"
             [src]="logoUrl"
             [alt]="siteName"
             class="logo-img" />
        <ng-template #defaultIcon>
      
        </ng-template>
      </div>
      <div>
        <div class="logo-name">{{ siteName }}</div>
        <div class="logo-sub">ELECTRON ELECTRONICS CO.</div>
      </div>
    </div>

    <div class="num-wrap">
      <div class="num-404">404</div>
      <div class="dot-a"></div>
      <div class="dot-b"></div>
      <div class="dot-c"></div>
    </div>

    <div class="ico-wrap">
      <svg width="34" height="34" viewBox="0 0 24 24"
           fill="none" stroke="#1565c0" stroke-width="1.7">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687
             0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21
             12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/>
      </svg>
    </div>

    <div class="badge-row">
      <div class="pulse-dot"></div>
      <span class="badge">الصفحة غير موجودة</span>
      <div class="pulse-dot"></div>
    </div>

    <h1>عذراً، هذه الصفحة<br><span>غير موجودة</span></h1>

    <p class="desc">
      الصفحة التي تبحث عنها ربما تم حذفها أو نقلها<br>
      أو أن الرابط الذي أدخلته غير صحيح
    </p>

    <div class="suggestions">
      <a routerLink="/" class="sug-item">
        <div class="sug-ico" style="background:#e8f0fb;">
          <svg width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="#1565c0" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12
                 M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875
                 c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125
                 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
          </svg>
        </div>
        <span class="sug-lbl">الرئيسية</span>
      </a>

      <a routerLink="/categories" class="sug-item">
        <div class="sug-ico" style="background:#fff3e8;">
          <svg width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="#f47920" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25
                 a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684
                 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106
                 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75
                 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/>
          </svg>
        </div>
        <span class="sug-lbl">المتجر</span>
      </a>

      <a routerLink="/contact-us" class="sug-item">
        <div class="sug-ico" style="background:#e6f4ef;">
          <svg width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="#15803d" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25
                 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25
                 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916
                 l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0
                 01-1.07-1.916V6.75"/>
          </svg>
        </div>
        <span class="sug-lbl">تواصل معنا</span>
      </a>
    </div>

    <div class="btns">
   
      <button class="btn-ghost" (click)="goBack()">
        <svg width="15" height="15" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3"/>
        </svg>
        الصفحة السابقة
      </button>
    </div>

  </div>

  <footer>
    جميع الحقوق محفوظة &copy; {{ year }} —
    <strong>شركة {{ siteName }}</strong>
  </footer>
</div>
