<div class="bg"></div>
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">
  <div class="card">

    <div class="logo">
      <div class="logo-ico">
        <img *ngIf="logoUrl; else defaultIcon"
             [src]="logoUrl"
             [alt]="siteName"
             class="logo-img" />
        <ng-template #defaultIcon>
          <svg width="26" height="26" viewBox="0 0 24 24"
               fill="none" stroke="#fff" stroke-width="2.2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12
                     M17.66 17.66l2.12 2.12M2 12h3M19 12h3
                     M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
          </svg>
        </ng-template>
      </div>
      <div>
        <div class="logo-name">{{ siteName }}</div>
        <div class="logo-sub">ELECTRON ELECTRONICS CO.</div>
      </div>
    </div>

    <div class="shop-ico">
      <svg width="38" height="38" viewBox="0 0 24 24"
           fill="none" stroke="#1565c0" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437
             M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218
             c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0
             00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75
             0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0
             11-1.5 0 .75.75 0 011.5 0z"/>
      </svg>
    </div>

    <div class="badge-row">
      <div class="pulse-dot"></div>
      <span class="badge">المتجر تحت الصيانة</span>
      <div class="pulse-dot"></div>
    </div>

    <h1 class="">نعود قريباً<br>بتجربة <span class="">أجمل</span></h1>

    <p class="desc">
      نعمل على تحسين المتجر الإلكتروني لنقدم لك<br>
      تجربة تسوق أسرع وأكثر سهولة
    </p>

    <div class="steps">
      <div *ngFor="let step of steps"
           class="step"
           [ngClass]="step.status">
        <div class="step-circle" [innerHTML]="step.icon"></div>
        <span class="step-lbl">{{ step.label }}</span>
      </div>
    </div>

    <div class="info-strip">
      <div class="info-ico">
        <svg width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="#fff" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25
               2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5
               4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25
               2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36
               0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
        </svg>
      </div>
      <div class="info-text">
        <div class="info-lbl">للاستفسار عن المنتجات</div>
        <div class="info-val">{{ email }}</div>
      </div>
    </div>

   

  </div>

  <footer>
    جميع الحقوق محفوظة &copy; {{ year }} —
    <strong>شركة {{ siteName }}</strong>
  </footer>
</div>
