@if (totalPages > 1) {
  <div class="flex items-center justify-center gap-2 py-6 px-4" dir="rtl">

    <!-- السابق -->
    <button
      (click)="goToPage(currentPage - 1)"
      [disabled]="currentPage === 1"
      class="flex items-center gap-1.5 h-10 px-4 rounded-2xl font-bold text-sm transition-all duration-200 disabled:opacity-30 disabled:cursor-not-allowed active:scale-95 cursor-pointer"
      style="background:#fff;color:#1565c0;border:1.5px solid #dbeafe;box-shadow:0 2px 8px rgba(21,101,192,.08)  ">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
      </svg>
      <span class="hidden sm:inline">السابق</span>
    </button>

    <!-- Pages container -->
    <div class="flex items-center gap-1 rounded-2xl px-2 py-1.5 cursor-pointer"
         style="background:#fff;border:1.5px solid #e8f0fb;box-shadow:0 2px 10px rgba(21,101,192,.07)">

      @for (page of pages; track page) {

        <!-- Ellipsis -->
        @if (page < 0) {
          <span class="w-8 h-9 flex items-center justify-center text-slate-300 text-sm font-bold select-none cursor-pointer">
            ···
          </span>
        }

        <!-- Page number -->
        @if (page > 0) {
          <button
            (click)="goToPage(page)"
            class="min-w-9 h-9 px-2 rounded-xl font-black text-sm transition-all duration-200 active:scale-95 cursor-pointer"
            [style]="page === currentPage
              ? 'background:linear-gradient(135deg,#1565c0,#0a237a);color:#fff;box-shadow:0 4px 14px rgba(21,101,192,.38);transform:scale(1.08);border:none;min-width:36px'
              : 'background:transparent;color:#64748b;border:none'">
            {{ page }}
          </button>
        }

      }
    </div>

    <!-- التالي -->
    <button
      (click)="goToPage(currentPage + 1)"
      [disabled]="currentPage === totalPages"
      class="flex items-center gap-1.5 h-10 px-4 rounded-2xl font-bold text-sm transition-all duration-200 disabled:opacity-30 disabled:cursor-not-allowed active:scale-95"
      style="background:linear-gradient(135deg,#1565c0,#0a237a);color:#fff;border:none;box-shadow:0 4px 14px rgba(21,101,192,.3)">
      <span class="hidden sm:inline">التالي</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>

  </div>
}
