<section class="hero-section-wrap" dir="rtl">

  <!-- Decorative floating background blobs -->
  <div class="hero-bg-decoration">
    <div class="hero-blob hero-blob-1"></div>
    <div class="hero-blob hero-blob-2"></div>
    <div class="hero-blob hero-blob-3"></div>
    <div class="hero-grid-pattern"></div>
  </div>

  <div class="hero-container">

    <div class="hero-grid">

      <!-- Text side -->
      <div class="hero-text-side">

        <!-- Badge -->
        <div class="hero-badge">
          <span class="hero-badge-dot"></span>
          <span>مرحبـــــــــــــا بـك في الكتــــــــرون</span>
        </div>

        <!-- Title with gradient accent -->
        <h1 class="hero-h1">
          شركة الكترون
          <span class="hero-h1-accent">للإلكترونيات</span>
        </h1>

        <!-- Description -->
        <p class="hero-desc">
          منتجاتك المفضلة بأسعار مميزة وخطط تقسيط مريحة — اختار وامتلك الآن!
        </p>

        <!-- CTA buttons (visible on all screens now) -->
        <div class="hero-cta-row">
          <a routerLink="/categories" class="hero-cta-primary">
            <span>تسوق الآن</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
            </svg>
          </a>
          <a routerLink="/offers" class="hero-cta-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6z"/>
            </svg>
            <span>تصفح العروض</span>
          </a>
        </div>

        <!-- Stats row — modern card style -->
        <div class="hero-stats">
          <div class="hero-stat" *ngFor="let stat of stats; let i = index" [style.animation-delay.ms]="i * 100 + 400">
            <div class="hero-stat-icon">
              <ng-container [ngSwitch]="stat.icon">
                <svg *ngSwitchCase="'shield'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <svg *ngSwitchCase="'users'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
                </svg>
                <svg *ngSwitchCase="'box'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21 7.5l-9-5.25L3 7.5m18 0l-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"/>
                </svg>
              </ng-container>
            </div>
            <div class="hero-stat-text">
              <div class="hero-stat-value">{{ stat.value }}</div>
              <div class="hero-stat-label">{{ stat.label }}</div>
            </div>
          </div>
        </div>

      </div>

      <!-- Image side -->
      <div class="hero-image-side">

        <!-- Floating accent badges -->
        <div class="hero-float-badge hero-float-badge-1">
          <div class="hero-float-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z"/>
            </svg>
          </div>
          <div class="hero-float-text">
            <div class="hero-float-title">تقسيط مرن</div>
            <div class="hero-float-sub">حتى 24 شهر</div>
          </div>
        </div>

        <div class="hero-float-badge hero-float-badge-2">
          <div class="hero-float-icon hero-float-icon-orange">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div class="hero-float-text">
            <div class="hero-float-title">ضمان أصلي</div>
            <div class="hero-float-sub">على كل المنتجات</div>
          </div>
        </div>

        <!-- Image with frame & glow -->
        <div class="hero-img-frame">
          <div class="hero-img-glow"></div>
<img src="/hero-image.svg" alt="منتجات الكترون" class="hero-img"/>
        </div>

      </div>

    </div>
  </div>
</section>
